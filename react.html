<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Programming‑1 - React CRUD</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
<div class="wrapper">
    <header>
        <h1>Web Programming‑1 Lecture Homework</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="javascript.html">JavaScript CRUD</a></li>
            <li><a href="react.html">React CRUD</a></li>
            <li><a href="spa.html">SPA</a></li>
            <li><a href="fetchapi.html">Fetch API CRUD</a></li>
            <li><a href="axios.html">Axios CRUD</a></li>
            <li><a href="oojs.html">OOJS</a></li>
        </ul>
    </nav>

    <main>
        <div id="root"></div>
    </main>

    <footer>
        <p>Created by: <strong>Ditso Ofile Mogajane (HH0DUU)</strong> & 
        <strong>Aws Bader (Zukgob)</strong></p>
    </footer>
</div>

<script type="text/babel">
    const { useState, useEffect } = React;

    // --- 1. User Table Component (READ/DELETE) ---
    const UserTable = (props) => (
        <table className="table table-hover mt-3">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Username</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {props.users.length > 0 ? (
                    props.users.map((user) => (
                        <tr key={user.id}>
                            <td>{user.name}</td>
                            <td>{user.username}</td>
                            <td>
                                <button 
                                    onClick={() => props.editRow(user)} 
                                    className="btn btn-sm btn-info me-2"
                                >
                                    Edit
                                </button>
                                <button 
                                    onClick={() => props.deleteUser(user.id)} 
                                    className="btn btn-sm btn-danger"
                                >
                                    Delete
                                </button>
                            </td>
                        </tr>
                    ))
                ) : (
                    <tr><td colSpan={3} className="text-center">No users found</td></tr>
                )}
            </tbody>
        </table>
    );

    // --- 2. Add User Form Component (CREATE) ---
    const AddUserForm = (props) => {
        const initialFormState = { id: null, name: '', username: '' };
        const [user, setUser] = useState(initialFormState);

        const handleInputChange = (event) => {
            const { name, value } = event.target;
            setUser({ ...user, [name]: value });
        };

        return (
            <form onSubmit={event => {
                event.preventDefault();
                if (!user.name || !user.username) return;
                props.addUser(user);
                setUser(initialFormState);
            }}>
                <div className="mb-2">
                    <label>Name</label>
                    <input type="text" name="name" value={user.name} onChange={handleInputChange} className="form-control" />
                </div>
                <div className="mb-2">
                    <label>Username</label>
                    <input type="text" name="username" value={user.username} onChange={handleInputChange} className="form-control" />
                </div>
                <button className="btn btn-primary w-100">Add New User</button>
            </form>
        );
    };

    // --- 3. Edit User Form Component (UPDATE - Page 56 useEffect) ---
    const EditUserForm = (props) => {
        const [user, setUser] = useState(props.currentUser);

        // This ensures the form updates if the currentUser prop changes
        useEffect(() => {
            setUser(props.currentUser);
        }, [props]);

        const handleInputChange = (event) => {
            const { name, value } = event.target;
            setUser({ ...user, [name]: value });
        };

        return (
            <form onSubmit={event => {
                event.preventDefault();
                props.updateUser(user.id, user);
            }}>
                <div className="mb-2">
                    <label>Name</label>
                    <input type="text" name="name" value={user.name} onChange={handleInputChange} className="form-control" />
                </div>
                <div className="mb-2">
                    <label>Username</label>
                    <input type="text" name="username" value={user.username} onChange={handleInputChange} className="form-control" />
                </div>
                <div className="d-flex gap-2">
                    <button className="btn btn-success flex-grow-1">Update User</button>
                    <button onClick={() => props.setEditing(false)} className="btn btn-secondary flex-grow-1">Cancel</button>
                </div>
            </form>
        );
    };

    // --- 4. Main App Component (STATE LOGIC) ---
    const App = () => {
        const initialData = [
            { id: 1, name: 'Ditso', username: 'mogajane' },
            { id: 2, name: 'Aws', username: 'neptunecode' },
        ];

        const [users, setUsers] = useState(initialData);
        const [editing, setEditing] = useState(false);
        const [currentUser, setCurrentUser] = useState({ id: null, name: '', username: '' });

        const addUser = (user) => {
            user.id = users.length + 1;
            setUsers([...users, user]);
        };

        const deleteUser = (id) => {
            setEditing(false);
            setUsers(users.filter((user) => user.id !== id));
        };

        const updateUser = (id, updatedUser) => {
            setEditing(false);
            setUsers(users.map((user) => (user.id === id ? updatedUser : user)));
        };

        const editRow = (user) => {
            setEditing(true);
            setCurrentUser({ id: user.id, name: user.name, username: user.username });
        };

        return (
            <div className="container py-4">
                <div className="row">
                    <div className="col-md-5">
                        {editing ? (
                            <div>
                                <h3 className="mb-3">Edit User</h3>
                                <EditUserForm 
                                    setEditing={setEditing} 
                                    currentUser={currentUser} 
                                    updateUser={updateUser} 
                                />
                            </div>
                        ) : (
                            <div>
                                <h3 className="mb-3">Add User</h3>
                                <AddUserForm addUser={addUser} />
                            </div>
                        )}
                    </div>
                    <div className="col-md-7">
                        <h3 className="mb-3">View Users</h3>
                        <UserTable 
                            users={users} 
                            editRow={editRow} 
                            deleteUser={deleteUser} 
                        />
                    </div>
                </div>
            </div>
        );
    };

    // --- 5. Initializing React ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
